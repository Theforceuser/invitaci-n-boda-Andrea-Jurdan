```html
<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Andrea & Jurdan</title>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
background:black;
font-family:sans-serif;
overflow-x:hidden;
color:white;
}

/* secciones */

.section{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* imágenes */

.section img{
max-width:95vw;
max-height:95vh;
object-fit:contain;
border-radius:10px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* animación apertura */

.fade-start{
animation:fadeIn 1s ease forwards;
opacity:0;
}

@keyframes fadeIn{
0%{
opacity:0;
filter:brightness(0);
}
100%{
opacity:1;
filter:brightness(1);
}
}

/* indicador scroll */

.scroll-indicator{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
font-size:14px;
opacity:0.8;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translate(-50%,0)}
50%{transform:translate(-50%,10px)}
}

/* flores flotando */

.flower{
position:fixed;
top:-50px;
font-size:20px;
animation:fall linear infinite;
opacity:0.6;
}

@keyframes fall{
0%{
transform:translateY(-50px);
}
100%{
transform:translateY(110vh);
}
}

/* brillo anillos */

.rings{
position:absolute;
animation:sparkle 3s infinite;
}

@keyframes sparkle{
0%,100%{filter:brightness(1)}
50%{filter:brightness(1.4)}
}

/* botón mapa */

.map-button{
position:absolute;
bottom:60px;
right:20px;
background:white;
color:black;
padding:10px 14px;
border-radius:20px;
font-size:14px;
text-decoration:none;
box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

</style>

</head>

<body>

<!-- flores -->

<div class="flower" style="left:10%;animation-duration:12s;">🌸</div>
<div class="flower" style="left:25%;animation-duration:15s;">🌼</div>
<div class="flower" style="left:40%;animation-duration:13s;">🌸</div>
<div class="flower" style="left:60%;animation-duration:18s;">🌼</div>
<div class="flower" style="left:80%;animation-duration:14s;">🌸</div>

<!-- música -->

<audio autoplay loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- portada -->

<section class="section fade-start">

<img src="boda1.png">

<div class="scroll-indicator">
Desliza ↓
</div>

</section>

<!-- orden del día -->

<section class="section">

<img src="boda2.png">

<a class="map-button" 
href="https://maps.google.com/?q=Boroa+Jatetxea" 
target="_blank">
📍 Ver ubicación
</a>

</section>

</body>
</html>
```
