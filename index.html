```html
<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Andrea & Jurdan</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
font-family:sans-serif;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* contenedor móvil */

.mobile-frame{
width:100vw;
height:100vh;
max-width:500px;
position:relative;
perspective:2000px;
}

/* páginas */

.page{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:black;
transform-origin:left;
transition:transform 1.2s ease;
}

/* imágenes verticales */

.page img{
height:100%;
width:auto;
max-width:100%;
object-fit:contain;
}

/* giro */

.mobile-frame.open .front{
transform:rotateY(-180deg);
}

/* texto escribir */

.intro{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-family:'Great Vibes',cursive;
font-size:55px;
color:white;
white-space:nowrap;
overflow:hidden;
border-right:3px solid white;
width:0;
animation:typing 2.5s steps(20,end) forwards, blink .7s infinite;
z-index:10;
}

@keyframes typing{
from{width:0}
to{width:260px}
}

@keyframes blink{
0%,100%{border-color:transparent}
50%{border-color:white}
}

.hide{
animation:fadeOut 1s forwards;
animation-delay:3s;
}

@keyframes fadeOut{
to{opacity:0}
}

/* botón tocar */

.tap{
position:absolute;
bottom:60px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:16px;
opacity:.9;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translate(-50%,0)}
50%{transform:translate(-50%,10px)}
}

</style>

</head>

<body>

<div class="mobile-frame" id="book">

<div class="intro hide">Nos casamos</div>

<div class="page front">
<img src="boda1.png">
<div class="tap">Toca para abrir</div>
</div>

<div class="page back">
<img src="boda2.png">
</div>

</div>

<script>

setTimeout(()=>{
document.body.addEventListener("click",()=>{
document.getElementById("book").classList.toggle("open");
});
},3500);

</script>

</body>
</html>
```
